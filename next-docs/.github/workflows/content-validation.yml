name: Content Validation

on:
  pull_request:
    paths:
      - 'src/content/**'
      - 'process_content.mjs'
      - 'scripts/**'
      - 'src/lib/content.ts'
      - 'src/app/api/content/preview/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  validate-content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Process content
        run: npm run process-content

      - name: Validate content preview rendering
        run: npm run content:preview

      - name: Run tests
        run: npm run test

      - name: Build app
        run: npm run build
